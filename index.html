<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Spensada Exam</title>

    <!-- PWA Setup -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#1E40AF">
    <link rel="apple-touch-icon" href="https://spensada.me/public/img/konfigurasi/logo/1758281903_cba80d84171bd85558c9.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Plus Jakarta Sans for premium feel -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        /* Base Styles & Typography */
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            background-color: #f1f5f9; /* Soft slate background */
            -webkit-font-smoothing: antialiased;
            overscroll-behavior-y: none; /* Mencegah pull-to-refresh di Chrome Mobile */
        }

        /* Input rules */
        input {
            -webkit-user-select: auto;
            user-select: auto;
        }
        input[type="text"] {
            font-size: 16px; /* Prevent iOS zoom */
        }

        /* Skeleton Loading Animation */
        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }
        .skeleton {
            position: relative;
            overflow: hidden;
            background-color: #e2e8f0;
            border-radius: 0.5rem;
        }
        .skeleton::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            transform: translateX(-100%);
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            animation: shimmer 1.5s infinite;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 0px; } /* Clean, no scrollbar like mobile apps */

        /* Animations */
        .fade-in { animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Loader Animation */
        .loader-dots div { animation-timing-function: cubic-bezier(0, 1, 1, 0); }
        .loader-dots div:nth-child(1) { left: 8px; animation: loader-dots1 0.6s infinite; }
        .loader-dots div:nth-child(2) { left: 8px; animation: loader-dots2 0.6s infinite; }
        .loader-dots div:nth-child(3) { left: 32px; animation: loader-dots2 0.6s infinite; }
        .loader-dots div:nth-child(4) { left: 56px; animation: loader-dots3 0.6s infinite; }
        @keyframes loader-dots1 { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        @keyframes loader-dots3 { 0% { transform: scale(1); } 100% { transform: scale(0); } }
        @keyframes loader-dots2 { 0% { transform: translate(0, 0); } 100% { transform: translate(24px, 0); } }
    </style>
</head>

<body class="text-slate-800 min-h-screen relative overflow-x-hidden">

    <!-- App Background -->
    <div class="fixed top-0 left-0 w-full h-[280px] bg-gradient-to-br from-[#1E40AF] via-[#3730A3] to-[#312E81] rounded-b-[2.5rem] shadow-xl z-[-1] overflow-hidden">

        <div class="absolute -top-10 -right-10 w-48 h-48 bg-white opacity-[0.07] rounded-full blur-2xl"></div>

                <div class="absolute inset-0 bg-gradient-to-tr from-white/10 to-transparent"></div>
                <img src="https://spensada.me/public/img/konfigurasi/logo/1758281903_cba80d84171bd85558c9.png" alt="Logo" class="w-10 h-10 object-contain drop-shadow-md relative z-10 transition-transform duration-300 hover:scale-105" onerror="this.style.display='none'">

    <!-- Main Content -->
    <main class="max-w-md w-full mx-auto px-5 pt-6 pb-12 flex flex-col relative z-10">

        <!-- Info Card (Overlapping header) -->
        <div class="bg-white rounded-[1.25rem] p-4 shadow-[0_8px_30px_rgb(0,0,0,0.06)] mb-8 flex flex-col items-center justify-center border border-slate-100 transform transition-transform hover:scale-[1.01]">

        <!-- State: Loading (Skeleton) -->

                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />

            <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center text-slate-300 mb-5 shadow-inner">

                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />

                </svg>

        <!-- State: Data List -->

    <!-- Token Modal (Bottom Sheet style) -->

        <!-- Modal Content -->

                    </div>

                </div>
                <div id="tokenError" class="mt-3 hidden animate-pulse">
                    <div class="flex items-center justify-center gap-1.5 bg-rose-50 text-rose-600 px-3 py-2 rounded-xl border border-rose-100 shadow-sm">

                    Mulai
                </button>

        </div>

    <!-- Application Script -->
    <script>
        /**
         * KONFIGURASI API
         */
        const URL_API = "https://script.google.com/macros/s/AKfycbwalO-HqOZpSYlOjBXl9stx3PzZUWrTadTJeojZ_AuMWFNrJk44vlozgXXEUiNO5Fugog/exec";
        const USE_DUMMY_DATA = false;

        // Data Management
        let examsBank = [];
        let secureLinks = {};
        let activeSelectedExamId = null;
        let kioskExamId = null;

        // Interval Management
        let refreshIntervalTimer = null;
        let countdownTimer = null;
        let clockTimer = null;

        // DOM Elements
        const elLoading = document.getElementById('loadingState');
        const elError = document.getElementById('errorState');
        const elEmpty = document.getElementById('emptyState');
        const elList = document.getElementById('examList');
        const statusContainer = document.getElementById('statusContainer');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const timeText = document.getElementById('serverTimeText');

        /**
         * SECURITY FEATURES
         */
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.keyCode == 123) e.preventDefault(); // F12
            if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) e.preventDefault();
            if (e.ctrlKey && e.keyCode === 85) e.preventDefault();
            if (e.ctrlKey && e.keyCode === 83) e.preventDefault();
        });
        window.addEventListener('beforeunload', function (e) {
            const msg = 'Apakah Anda yakin ingin keluar? Ujian mungkin sedang berlangsung.';
            e.preventDefault();
            e.returnValue = msg;
            return msg;
        });

        function parseDate(dateStr) {
            if (!dateStr) return new Date(0);
            try {
                if (dateStr.includes('T')) return new Date(dateStr);
                const parts = dateStr.split(' ');
                if (parts.length !== 2) return new Date(dateStr);
                const dateParts = parts[0].split('-');
                const timeParts = parts[1].split(':');
                return new Date(dateParts[0], dateParts[1] - 1, dateParts[2], timeParts[0], timeParts[1]);
            } catch (e) {
                return new Date(0);
            }
        }

        function formatCountdown(diffMs) {
            if (diffMs <= 0) return "Selesai";
            const h = Math.floor((diffMs / (1000 * 60 * 60)) % 24);
            const m = Math.floor((diffMs / 1000 / 60) % 60);
            const s = Math.floor((diffMs / 1000) % 60);
            if (h > 0) return `${h}j ${m}m ${s}d`;
            return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }

        function updateClock() {
            const now = new Date();
            const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
            const day = days[now.getDay()];
            const timeStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            timeText.innerText = `${day}, ${timeStr}`;
        }

        function setAppStatus(state) {
            statusContainer.className = 'flex items-center gap-1.5 px-3 py-1.5 rounded-full border shadow-sm transition-all duration-300';
            switch (state) {
                case 'online':
                    statusContainer.classList.add('bg-white/20', 'backdrop-blur-md', 'border-white/20');
                    statusDot.className = 'w-2 h-2 rounded-full bg-emerald-400 shadow-[0_0_6px_rgba(52,211,153,0.8)] animate-pulse';
                    statusText.innerText = 'ONLINE';
                    statusText.className = 'text-[9px] font-bold text-white uppercase tracking-widest';
                    break;
                case 'offline':
                case 'error':
                    statusContainer.classList.add('bg-rose-500/80', 'backdrop-blur-md', 'border-rose-400/50');
                    statusDot.className = 'w-2 h-2 rounded-full bg-white shadow-[0_0_6px_rgba(255,255,255,0.6)]';
                    statusText.innerText = 'TERPUTUS';
                    statusText.className = 'text-[9px] font-bold text-white uppercase tracking-widest';
                    break;
                case 'sync':
                    statusContainer.classList.add('bg-white/10', 'backdrop-blur-md', 'border-white/10');
                    statusDot.className = 'w-2 h-2 rounded-full bg-blue-300 animate-ping';
                    statusText.innerText = 'SYNC';
                    statusText.className = 'text-[9px] font-bold text-white/80 uppercase tracking-widest';
                    break;
            }
        }

        async function fetchData() {
            // Tampilkan Skeleton Loading (loadingState)
            elLoading.classList.remove('hidden');
            elError.classList.add('hidden');
            elEmpty.classList.add('hidden');
            elList.classList.add('hidden');
            elList.innerHTML = '';
            setAppStatus('sync');

            try {
                let data = [];
                if (USE_DUMMY_DATA) {
                    await new Promise(r => setTimeout(r, 1200)); // Simulasi load sedikit lebih lama untuk pamer skeleton
                    const todayCurrent = new Date();
                    let activeStart = new Date(todayCurrent.getTime() - (1000 * 60 * 30));
                    let activeEnd = new Date(todayCurrent.getTime() + (1000 * 60 * 90));
                    let upcomingStart = new Date(todayCurrent.getTime() + (1000 * 60 * 120));
                    let upcomingEnd = new Date(todayCurrent.getTime() + (1000 * 60 * 240));

                    const formatForJSON = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;

                    data = [
                        { "id": "1", "nama": "Matematika X - Semester 1", "link": "https://forms.gle/demo1", "start": formatForJSON(activeStart), "end": formatForJSON(activeEnd), "status": "aktif", "token": "MATH10" },
                        { "id": "2", "nama": "Bahasa Indonesia X", "link": "https://forms.gle/demo2", "start": formatForJSON(upcomingStart), "end": formatForJSON(upcomingEnd), "status": "aktif", "token": "INDO10" }
                    ];
                } else {
                    const response = await fetch(URL_API);
                    if (!response.ok) throw new Error("Gagal");
                    data = await response.json();

                    // PROTEKSI SIBUK: Jika server mengembalikan flag retry (karena lock antrean penuh)
                    if (data.retryAlert) {
                        setAppStatus('sync');
                        console.warn("Server sibuk, mencoba sinkronisasi otomatis dalam 3 detik...");
                        setTimeout(fetchData, 3000);
                        return;
                    }
                }

                if (data.error) throw new Error(data.message);

                examsBank = data.map(item => ({
                    ...item,
                    startObj: parseDate(item.start),
                    endObj: parseDate(item.end)
                }));

                setAppStatus('online');
                processAndRenderExams();

            } catch (err) {
                setAppStatus('error');
                elLoading.classList.add('hidden');
                elError.classList.remove('hidden');
                document.getElementById('errorMessage').innerText = err.message || "Gagal menghubungi peladen sekolah.";
            }
        }

        function processAndRenderExams() {
            const now = new Date();
            let validExamsCount = 0;
            secureLinks = {}; 
            elList.innerHTML = '';

            examsBank.forEach(exam => {
                if (exam.status?.toLowerCase() !== 'aktif') return;

                const isUpcomingStr = now < exam.startObj;
                const isActiveStr = now >= exam.startObj && now <= exam.endObj;
                const isFinishedStr = now > exam.endObj;

                if (isFinishedStr) return; 

                validExamsCount++;
                secureLinks[exam.id] = exam.link;

                // DESIGN TERBARU KARTU UJIAN (SPLIT CARD)
                const cardHtml = `
                    <div class="bg-white rounded-[1.5rem] shadow-[0_8px_30px_rgb(0,0,0,0.06)] relative flex flex-col mb-6 border border-slate-100/50 overflow-hidden transform transition-transform hover:-translate-y-1" id="card-${exam.id}">
                        
                        <!-- Top status line -->
                        <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r ${isActiveStr ? 'from-indigo-500 to-blue-500' : 'from-slate-200 to-slate-200'} z-10"></div>
                        
                        <!-- Card Body (Info Area) -->
                        <div class="p-6 pb-4 relative">
                            ${isActiveStr ? '<div class="absolute -top-10 -right-10 w-32 h-32 bg-indigo-50 rounded-full blur-2xl z-0 pointer-events-none"></div>' : ''}
                            
                            <div class="flex justify-between items-start mb-3 relative z-10">
                                <div class="flex flex-col">
                                    <div class="flex items-center gap-1.5 px-2.5 py-1.5 ${isActiveStr ? 'bg-indigo-50 text-indigo-700' : 'bg-slate-100 text-slate-500'} rounded-lg inline-flex w-max mb-3">
                                        ${isActiveStr ? '<svg class="w-3.5 h-3.5 text-indigo-600 animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>' : '<svg class="w-3.5 h-3.5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>'}
                                        <span class="text-[9px] font-extrabold uppercase tracking-[0.15em]">${isActiveStr ? 'ZONA AKTIF' : 'ZONA TERJADWAL'}</span>
                                    </div>
                                    <h3 class="text-[18px] font-extrabold text-slate-800 leading-snug tracking-tight pr-4">${exam.nama}</h3>
                                </div>
                            </div>
                            
                            <div class="flex items-center gap-2 text-slate-500 relative z-10 mb-1 mt-3">
                                <svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                <p class="text-[12px] font-semibold tracking-wide">Tersedia: ${exam.start.split(' ')[1]} s/d ${exam.end.split(' ')[1]}</p>
                            </div>
                        </div>

                        <!-- Card Footer (Action Area) -->
                        <div class="${isActiveStr ? 'bg-indigo-50/30' : 'bg-slate-50/50'} p-6 pt-5 border-t border-slate-100 mt-auto flex flex-col gap-4 relative z-10">
                            
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-1.5">
                                    ${isActiveStr ? '<svg class="w-4 h-4 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>' : '<svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>'}
                                    <span class="text-[10px] font-extrabold text-slate-500 uppercase tracking-widest">${isActiveStr ? 'WAKTU TERSISA:' : 'DIBUKA DALAM:'}</span>
                                </div>
                                <span class="text-sm font-black ${isActiveStr ? 'text-rose-500' : 'text-slate-500'} font-mono bg-white px-3 py-1.5 rounded-lg shadow-sm border border-slate-100/80 tracking-wider" id="${isActiveStr ? 'countdown-'+exam.id : 'countdown-start-'+exam.id}">--:--:--</span>
                            </div>
                            
                            ${isActiveStr ? `
                                <button onclick="openTokenModal('${exam.id}', '${exam.nama}')" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 active:scale-[0.98] text-white font-bold text-[14px] rounded-xl shadow-[0_6px_20_rgba(79,70,229,0.25)] transition-all flex justify-center items-center gap-2">
                                    <span>KERJAKAN SEKARANG</span>
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
                                </button>
                            ` : `
                                <button disabled class="w-full py-4 bg-slate-200/80 text-slate-400 font-bold text-[14px] rounded-xl cursor-not-allowed border border-slate-200/50 shadow-inner">
                                    BELUM DIBUKA
                                </button>
                            `}
                        </div>
                    </div>
                `;
                elList.insertAdjacentHTML('beforeend', cardHtml);
            });

            // Sembunyikan Skeleton & Tampilkan Konten Asli
            elLoading.classList.add('hidden');
            if (validExamsCount === 0) {
                elEmpty.classList.remove('hidden');
                elList.classList.add('hidden');
            } else {
                elEmpty.classList.add('hidden');
                elList.classList.remove('hidden');
                elList.classList.add('flex');
            }
        }

        function startCountdowns() {
            countdownTimer = setInterval(() => {
                const now = new Date();

                examsBank.forEach(exam => {
                    const elEnd = document.getElementById(`countdown-${exam.id}`);
                    const elStart = document.getElementById(`countdown-start-${exam.id}`);

                    if (elEnd && now <= exam.endObj) {
                        elEnd.innerText = formatCountdown(exam.endObj - now);
                        if (now >= exam.endObj) fetchData();
                    }

                    if (elStart && now < exam.startObj) {
                        elStart.innerText = formatCountdown(exam.startObj - now);
                        if (now >= exam.startObj) fetchData();
                    }

                    if (kioskExamId === exam.id) {
                        const kTimer = document.getElementById('kioskTimer');
                        if (kTimer) {
                            if (now <= exam.endObj) {
                                kTimer.innerText = formatCountdown(exam.endObj - now);
                            } else {
                                kTimer.innerText = "WAKTU HABIS";
                                kTimer.classList.replace('text-emerald-400', 'text-rose-400');
                                kTimer.classList.replace('border-white/10', 'border-rose-400/30');
                                kTimer.classList.add('bg-rose-900/40');
                            }
                        }
                    }
                });

            }, 1000);
        }

        function openTokenModal(examId, examName) {
            activeSelectedExamId = examId;
            document.getElementById('modalExamName').innerText = examName;
            document.getElementById('tokenInput').value = '';
            document.getElementById('tokenError').classList.add('hidden');

            const modal = document.getElementById('tokenModal');
            const modalContent = document.getElementById('tokenModalContent');

            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.style.opacity = '1';
                modalContent.classList.remove('translate-y-full', 'sm:scale-95');
                modalContent.classList.add('translate-y-0', 'sm:scale-100');
                document.getElementById('tokenInput').focus();
            }, 10);
        }

        function closeTokenModal() {
            const modal = document.getElementById('tokenModal');
            const modalContent = document.getElementById('tokenModalContent');

            modal.style.opacity = '0';
            modalContent.classList.remove('translate-y-0', 'sm:scale-100');
            modalContent.classList.add('translate-y-full', 'sm:scale-95');

            setTimeout(() => {
                modal.classList.add('hidden');
                activeSelectedExamId = null;
            }, 300);
        }

        function submitToken() {
            if (!activeSelectedExamId) return;

            const inputVal = document.getElementById('tokenInput').value.trim().toUpperCase();
            const examInfo = examsBank.find(e => e.id === activeSelectedExamId);

            if (examInfo && examInfo.token) {
                if (inputVal !== examInfo.token.toUpperCase()) {
                    document.getElementById('tokenError').classList.remove('hidden');
                    const modalContent = document.getElementById('tokenModalContent');
                    modalContent.classList.add('animate-shake');
                    modalContent.animate([
                        { transform: 'translateX(0px)' },
                        { transform: 'translateX(-6px)' },
                        { transform: 'translateX(6px)' },
                        { transform: 'translateX(0px)' }
                    ], { duration: 300 });
                    return;
                }
            } else {
                if (inputVal === "") {
                    document.getElementById('tokenError').classList.remove('hidden');
                    return;
                }
            }

            executeSecureRedirect(activeSelectedExamId);
        }

        function requestFullscreenLock() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen().catch(e => console.log(e));
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen().catch(e => console.log(e));
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen().catch(e => console.log(e));
            }
        }

        function exitFullscreenLock() {
            if (document.exitFullscreen) {
                document.exitFullscreen().catch(e => console.log(e));
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen().catch(e => console.log(e));
            } else if (document.msExitFullscreen) {
                document.msExitFullscreen().catch(e => console.log(e));
            }
        }

        function exitKioskMode() {
            if(confirm("YAKIN INGIN KELUAR DARI UJIAN? Jika belum menekan tombol Submit/Kirim, jawaban Anda mungkin hilang!")) {
                exitFullscreenLock();
                const kiosk = document.getElementById('kioskContainer');
                if(kiosk) kiosk.remove();
                kioskExamId = null;
                document.body.style.overflow = "auto";
                fetchData();
            }
        }

        function executeSecureRedirect(examId) {
            const link = secureLinks[examId];
            const examInfo = examsBank.find(e => e.id === examId);
            
            if (!link || !examInfo) {
                alert("Link ujian tidak ditemukan atau sesi invalid.");
                fetchData();
                return;
            }

            closeTokenModal();
            kioskExamId = examId;
            document.body.style.overflow = "hidden";

            const kioskHtml = `
                <div id="kioskContainer" class="fixed inset-0 z-[9999] bg-slate-50 flex flex-col h-[100dvh] w-[100dvw]">
                    <div class="bg-slate-900 border-b border-white/10 text-white px-4 py-3 flex justify-between items-center shadow-xl">
                        <div class="flex items-center gap-3 overflow-hidden flex-1">
                            <div class="w-2.5 h-2.5 rounded-full bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.8)] animate-pulse hidden sm:block flex-shrink-0"></div>
                            <span class="font-bold text-xs sm:text-[14px] text-slate-200 truncate mr-1 tracking-wide opacity-90">${examInfo.nama}</span>
                            <span class="bg-black/50 border border-white/10 px-2.5 py-1 rounded-xl text-xs font-mono font-black tracking-widest text-emerald-400 whitespace-nowrap shadow-inner" id="kioskTimer">--:--</span>
                        </div>
                        <button onclick="exitKioskMode()" class="bg-rose-600 hover:bg-rose-500 active:scale-95 transition-transform duration-200 text-white text-[11px] sm:text-xs font-extrabold px-4 py-2 rounded-xl shadow-md whitespace-nowrap flex-shrink-0 ml-3">
                            KELUAR
                        </button>
                    </div>
                    <div class="flex-1 w-full bg-slate-50 relative">
                        <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none z-0">
                             <div class="loader-dots relative w-20 h-5 mb-3"><div class="absolute top-1 w-3 h-3 rounded-full bg-indigo-300"></div><div class="absolute top-1 w-3 h-3 rounded-full bg-indigo-300"></div><div class="absolute top-1 w-3 h-3 rounded-full bg-indigo-300"></div><div class="absolute top-1 w-3 h-3 rounded-full bg-indigo-300"></div></div>
                             <p class="text-xs text-slate-500 font-semibold tracking-wide">Menghubungkan Halaman Ujian...</p>
                        </div>
                        <iframe src="${link}" class="w-full h-full border-none z-10 relative bg-transparent" allow="fullscreen" sandbox="allow-scripts allow-top-navigation allow-forms allow-same-origin allow-popups"></iframe>
                    </div>
                </div>
            `;
            
            document.body.insertAdjacentHTML('beforeend', kioskHtml);
            requestFullscreenLock();
        }

        function initApp() {
            fetchData();
            updateClock();
            clockTimer = setInterval(updateClock, 1000);
            function scheduleNextRefresh() {
                const delayMs = 30000 + Math.floor(Math.random() * 15000);
                refreshIntervalTimer = setTimeout(() => {
                    if (!activeSelectedExamId && !kioskExamId) fetchData();
                    scheduleNextRefresh();
                }, delayMs);
            }
            scheduleNextRefresh();
            startCountdowns();
        }

        // Service Worker Silent Registration for PWA Support
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.error('SW Registration Failed:', err));
            });
        }

        window.addEventListener('DOMContentLoaded', initApp);



    </script>
</body>
</html>
